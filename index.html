<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT</title>
<style>
  :root{
    --bg:#ffffff;--sidebar:#f9f9f9;--text:#0d0d0d;--muted:#8f8f8f;--bubble:#f4f4f4;
    --divider:#e9e9e9;--hover:#ececec;--active:#e8e8e8;--composer-bg:#f4f4f4;
    --glovo-yellow:#ffc244;--glovo-green:#00a082;--col:768px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
    color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}
  svg{display:block;}
  .hidden{display:none !important;}

  /* ====== beszélgetés-tartalom (MAGYAR) ====== */
  .assistant{font-size:16px;line-height:1.7;}
  .assistant p{margin:0 0 4px;}.assistant strong{font-weight:700;}
  .assistant h2{font-size:20px;font-weight:700;line-height:1.3;letter-spacing:-.2px;margin:26px 0 14px;border-top:1px solid var(--divider);padding-top:24px;}
  .assistant h2 .emoji{font-weight:400;margin-right:8px;}
  .alap{margin:0 0 12px;}
  ul.dash{list-style:none;margin:0 0 4px;padding:0;}
  ul.dash li{position:relative;padding-left:22px;margin-bottom:10px;line-height:1.55;}
  ul.dash li::before{content:"•";position:absolute;left:4px;top:-1px;}
  .tip{margin:14px 0 0;line-height:1.55;}.tip .hand{margin-right:5px;}
  .mobile .assistant{font-size:17px;line-height:1.55;}
  .mobile .assistant h2{font-size:21px;}

  /* ====== Glovo-reklám ====== */
  .ad-head{display:flex;align-items:flex-start;gap:10px;border-top:1px solid var(--divider);margin-top:28px;padding-top:22px;}
  .glovo-logo{width:34px;height:34px;border-radius:50%;background:var(--glovo-yellow);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:12px;color:var(--glovo-green);letter-spacing:-.3px;position:relative;}
  .glovo-logo sup{font-size:9px;position:absolute;top:6px;right:4px;}
  .ad-head-text{flex:1;line-height:1.25;}
  .ad-name{font-size:15px;font-weight:600;}
  .mobile .ad-name{font-size:16px;}
  .ad-sponsored{font-size:14px;color:var(--muted);margin-top:1px;}
  .mobile .ad-sponsored{font-size:15px;}
  .ad-dots{color:var(--muted);font-size:18px;letter-spacing:1px;cursor:pointer;}
  .mobile .ad-dots{font-size:20px;}
  .ad-sub{color:var(--muted);font-size:15px;line-height:1.5;margin:14px 0 14px;}
  .mobile .ad-sub{font-size:16px;margin-bottom:16px;}
  .ad-card{background:#f7f7f7;border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:520px;cursor:pointer;}
  .ad-card:hover{background:#f1f1f1;}
  .ad-card-text{flex:1;}
  .ad-card-title{font-size:16px;font-weight:600;margin-bottom:5px;}
  .mobile .ad-card-title{font-size:17px;margin-bottom:6px;}
  .ad-card-desc{font-size:14px;color:var(--muted);line-height:1.4;}
  .mobile .ad-card-desc{font-size:15px;}
  .ad-card-img{width:96px;height:66px;border-radius:12px;flex-shrink:0;overflow:hidden;position:relative;background:#241710;}
  .mobile .ad-card-img{width:92px;height:64px;}
  .burger{position:absolute;inset:0;background:
      radial-gradient(circle at 30% 38%, #f2b65a 0 9px, transparent 9px),
      radial-gradient(circle at 68% 30%, #f0ad4e 0 8px, transparent 8px),
      linear-gradient(180deg,#3a2417 0%,#241710 100%);}
  .burger::before{content:"🍔🍔";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;}

  /* ====== streaming ====== */
  .s-hide{display:none !important;}
  .s-in{animation:streamIn .28s ease both;}
  @keyframes streamIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
  .caret{display:inline-block;width:8px;height:1.05em;background:#0d0d0d;border-radius:1px;transform:translateY(2px);margin-left:2px;animation:caret .9s steps(1) infinite;}
  @keyframes caret{0%,50%{opacity:1;}51%,100%{opacity:0;}}
  .thinking{display:flex;gap:6px;align-items:center;padding:2px 0 22px;}
  .mobile .thinking{padding:6px 2px 18px;}
  .thinking span{width:8px;height:8px;border-radius:50%;background:#c4c4c4;animation:blink 1.2s infinite ease-in-out;}
  .thinking span:nth-child(2){animation-delay:.2s;}.thinking span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

  .user-row{display:flex;justify-content:flex-end;}
  .user-bubble{background:var(--bubble);border-radius:22px;padding:11px 18px;max-width:70%;font-size:16px;line-height:1.5;}
  .mobile .user-bubble{padding:14px 18px;max-width:80%;font-size:17px;line-height:1.45;}

  /* ====== hero (köszöntő + teljes szövegű középső doboz) ====== */
  #heroGreeting{font-weight:600;text-align:center;letter-spacing:-.4px;margin:0 0 26px;}
  .desktop #heroGreeting{font-size:30px;}
  .mobile #heroGreeting{font-size:23px;margin-bottom:22px;}
  .hero-composer{background:#fff;border:1px solid #e4e4e4;border-radius:28px;box-shadow:0 2px 14px rgba(0,0,0,.05);padding:8px 10px 8px;}
  .hc-text{font-size:16px;line-height:1.55;color:var(--text);padding:8px 8px 4px;overflow-wrap:break-word;}
  .mobile .hc-text{font-size:17px;}
  .hc-row{display:flex;align-items:center;gap:10px;padding:2px 4px;}
  .hc-plus{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#3a3a3a;}
  .hc-spacer{flex:1;}
  .hc-mic{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .hc-send{width:36px;height:36px;border-radius:50%;background:#0d0d0d;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .hc-send.pulse{animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(13,13,13,.32);}70%{box-shadow:0 0 0 9px rgba(13,13,13,0);}100%{box-shadow:0 0 0 0 rgba(13,13,13,0);}}
  .hc-caret{display:inline-block;width:2px;height:1.05em;background:#0d0d0d;transform:translateY(3px);margin-left:1px;animation:caret .9s steps(1) infinite;}

  /* ===================== DESKTOP (oldal-szintű görgetés) ===================== */
  .desktop .sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;overflow-y:auto;background:var(--sidebar);border-right:1px solid var(--divider);display:flex;flex-direction:column;padding:8px;z-index:10;}
  .desktop .sb-top{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 10px;}
  .desktop .sb-logo{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
  .desktop .sb-icon-btn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .desktop .sb-icon-btn:hover{background:var(--hover);}
  .desktop .sb-nav{display:flex;flex-direction:column;gap:1px;}
  .desktop .sb-item{display:flex;align-items:center;gap:11px;padding:8px;border-radius:8px;font-size:14px;cursor:pointer;line-height:1;}
  .desktop .sb-item:hover{background:var(--hover);}
  .desktop .sb-item.cur{background:var(--active);}
  .desktop .sb-section{font-size:12px;color:var(--muted);padding:16px 10px 6px;font-weight:500;}
  .desktop .sb-chat{padding:8px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .desktop .sb-chat:hover{background:var(--hover);}
  .desktop .sb-chat.active{background:var(--active);}
  .desktop .sb-spacer{flex:1;min-height:12px;}

  .desktop .main{margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
  .desktop .topbar{position:sticky;top:0;z-index:5;background:#fff;height:54px;display:flex;align-items:center;padding:0 16px;}
  .desktop .model-switcher{display:flex;align-items:center;gap:5px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:18px;font-weight:600;color:#3a3a3a;}
  .desktop .model-switcher:hover{background:var(--hover);}
  .desktop .model-switcher .chev{color:var(--muted);}
  .desktop .landing{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .desktop .hero{width:100%;max-width:var(--col);}
  .desktop .conv{flex:1;display:flex;flex-direction:column;}
  .desktop .thread{flex:1;width:100%;max-width:var(--col);margin:0 auto;padding:24px 24px 8px;}
  .desktop .user-row{margin:8px 0 28px;}
  .desktop .composer-wrap{width:100%;max-width:var(--col);margin:0 auto;padding:6px 24px 4px;}
  .desktop .composer{background:var(--composer-bg);border-radius:28px;padding:10px 12px 10px 14px;}
  .desktop .composer-text{font-size:16px;color:var(--muted);padding:8px 4px 10px;min-height:24px;}
  .desktop .composer-row{display:flex;align-items:center;gap:8px;}
  .desktop .c-btn{height:34px;border-radius:18px;display:flex;align-items:center;justify-content:center;gap:6px;color:#3a3a3a;}
  .desktop .c-round{width:34px;}
  .desktop .c-pill{padding:0 12px;font-size:14px;border:1px solid var(--divider);}
  .desktop .c-spacer{flex:1;}
  .desktop .c-mic{width:34px;}
  .desktop .c-voice{width:34px;height:34px;border-radius:50%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;}
  .desktop .footer-line{text-align:center;font-size:12px;color:var(--muted);padding:8px 24px 18px;}
  .desktop .continue-wrap{width:100%;max-width:var(--col);margin:0 auto;padding:0 24px 28px;display:flex;align-items:center;gap:14px;justify-content:flex-end;}
  .desktop .continue-hint{font-size:13px;color:var(--muted);}
  .desktop .continue-btn{height:44px;padding:0 28px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:#10a37f;color:#fff;}

  .c-voice .bars,.voice .bars{display:flex;gap:2px;align-items:center;height:15px;}
  .c-voice .bars i,.voice .bars i{width:2px;background:#fff;border-radius:2px;display:block;}
  .bars i:nth-child(1){height:6px;}.bars i:nth-child(2){height:11px;}.bars i:nth-child(3){height:15px;}.bars i:nth-child(4){height:9px;}.bars i:nth-child(5){height:6px;}

  /* ===================== MOBILE (oldal-szintű görgetés) ===================== */
  .mobile .phone{width:100%;max-width:500px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;}
  .mobile .topbar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;}
  .mobile .icon-btn{width:40px;height:40px;border-radius:50%;background:#f4f4f4;display:flex;align-items:center;justify-content:center;border:none;}
  .mobile .top-right{display:flex;align-items:center;gap:18px;}
  .mobile .top-right .icon-btn{background:transparent;width:auto;height:auto;}
  .mobile .landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .mobile .hero{width:100%;}
  .mobile .conv{flex:1;display:flex;flex-direction:column;}
  .mobile .chat{flex:1;padding:6px 18px 8px;}
  .mobile .composer{padding:8px 16px 10px;}
  .mobile .composer-inner{display:flex;align-items:center;gap:12px;}
  .mobile .plus{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .mobile .input-pill{flex:1;font-size:17px;color:var(--muted);}
  .mobile .mic{flex-shrink:0;}
  .mobile .voice{width:38px;height:38px;border-radius:50%;background:#0d0d0d;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .mobile .voice .bars{height:16px;}
  .mobile .voice .bars i:nth-child(1){height:6px;}.mobile .voice .bars i:nth-child(2){height:12px;}.mobile .voice .bars i:nth-child(3){height:16px;}.mobile .voice .bars i:nth-child(4){height:10px;}.mobile .voice .bars i:nth-child(5){height:6px;}
  .mobile .footer-line{text-align:center;font-size:11px;color:var(--muted);padding:4px 16px 6px;}
  .mobile .continue-bar{padding:12px 16px calc(20px + env(safe-area-inset-bottom));}
  .mobile .continue-btn{width:100%;height:48px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;background:#10a37f;color:#fff;}
  .mobile .continue-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:8px;}

  /* ====== záró képernyő ====== */
  .end-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#fff;padding:24px;}
  .end-card{text-align:center;max-width:420px;}
  .end-check{width:64px;height:64px;border-radius:50%;background:#10a37f;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;}
  .end-card h1{font-size:26px;font-weight:700;margin:0 0 10px;letter-spacing:-.3px;}
  .end-card p{font-size:15px;color:var(--muted);line-height:1.55;margin:0;}
</style>
</head>
<body>
  <div id="root"></div>

<script>
/* ============================================================
   KONTEXTUÁLIS (disclosed, kártyás) inger.
   Felület: ANGOL. Beszélgetés + oldalsáv chat-címek: MAGYAR.
   Eszközdetektálás: mobil / web.  Kényszerítés: ?device=mobile | ?device=desktop
   Oldal-szintű görgetés (nincs törékeny belső görgető-konténer).
   Folyamat: landing -> küldés -> „gépel…" -> válasz streamel a Glovo-reklámmal
   -> 60 mp olvasási idő után „Tovább" -> „Szimuláció vége" (+postMessage).
   ============================================================ */
var STUDY = {
  condition: 'contextual',
  greeting: "What's on the agenda today?",
  promptText: "Nagyon éhes vagyok, és egyáltalán nincs időm főzni a tanulás miatt. Milyen laktató meleg ételt tudnék a leggyorsabban összedobni magamnak?",
  typingDelayMs: 900,
  readingSeconds: 60,
  failsafeMs: 10000
};

var RESPONSE =
  '<p class="s-hide">Teljesen érthető 😊 Ilyenkor a cél: <strong>meleg, laktató, minimális idő + minimális gondolkodás</strong>. Íme pár brutál gyors opció, amik tényleg működnek tanulás közben:</p>' +
  '<h2 class="s-hide"><span class="emoji">🥚</span>1. Tojásos „mindent bele” serpenyő (5–10 perc)</h2>' +
  '<p class="alap s-hide"><strong>Alap:</strong> tojás + bármi, ami van otthon</p>' +
  '<ul class="dash">' +
    '<li class="s-hide">Üss fel 2–4 tojást</li>' +
    '<li class="s-hide">Dobj bele: sonka, sajt, zöldség, maradék hús, akár kenyérdarabok</li>' +
    '<li class="s-hide">Só, bors, kész</li>' +
  '</ul>' +
  '<p class="tip s-hide"><span class="hand">👉</span>Laktató, fehérjedús, és tényleg nem lehet elrontani.</p>' +
  '<h2 class="s-hide"><span class="emoji">🍝</span>2. Gyors tészta (10–12 perc)</h2>' +
  '<p class="alap s-hide"><strong>Alap:</strong> tészta + kész szósz</p>' +
  '<ul class="dash">' +
    '<li class="s-hide">Főzd meg a tésztát</li>' +
    '<li class="s-hide">Keverj hozzá bolti paradicsomszószt vagy pestót</li>' +
    '<li class="s-hide">Extra: tonhal, sajt</li>' +
  '</ul>' +
  '<p class="tip s-hide"><span class="hand">👉</span>Ha nagyon éhes vagy, ez az egyik legjobb „comfort food”.</p>' +
  '<h2 class="s-hide"><span class="emoji">🥪</span>3. Melegszendvics / serpenyős toast (5–8 perc)</h2>' +
  '<ul class="dash">' +
    '<li class="s-hide">Kenyér + sajt + sonka</li>' +
    '<li class="s-hide">Serpenyőben megsütöd (vagy szendvicssütőben)</li>' +
  '</ul>' +
  '<p class="tip s-hide"><span class="hand">👉</span>Kívül ropogós, belül olvadós → instant boldogság.</p>' +
  '<div id="ad" class="s-hide">' +
    '<div class="ad-head">' +
      '<div class="glovo-logo">Glovo<sup>°</sup></div>' +
      '<div class="ad-head-text"><div class="ad-name">Glovo</div><div class="ad-sponsored">Sponsored</div></div>' +
      '<div class="ad-dots">•••</div>' +
    '</div>' +
    '<p class="ad-sub">Gyors és kényelmes megoldások a mindennapi étkezésekhez.</p>' +
    '<div class="ad-card">' +
      '<div class="ad-card-text"><div class="ad-card-title">Gyors étel kiszállítás</div><div class="ad-card-desc">Rendelj gyors ebédet – készételek és napi menük…</div></div>' +
      '<div class="ad-card-img"><div class="burger"></div></div>' +
    '</div>' +
  '</div>';

var HERO =
  '<section class="landing" id="landing"><div class="hero">' +
    '<h1 id="heroGreeting"></h1>' +
    '<div class="hero-composer">' +
      '<div class="hc-text" id="heroText"></div>' +
      '<div class="hc-row">' +
        '<span class="hc-plus"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round"/></svg></span>' +
        '<span class="hc-spacer"></span>' +
        '<span class="hc-mic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="11" rx="3" stroke="#3a3a3a" stroke-width="1.7"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#3a3a3a" stroke-width="1.7" stroke-linecap="round"/></svg></span>' +
        '<button class="hc-send pulse" id="heroSend" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
      '</div>' +
    '</div>' +
  '</div></section>';

var SHELL_WEB =
  '<div class="app">' +
    '<aside class="sidebar">' +
      '<div class="sb-top">' +
        '<div class="sb-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="#0d0d0d"><circle cx="12" cy="12" r="9" /></svg></div>' +
        '<div class="sb-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" stroke="#3a3a3a" stroke-width="1.7"/><path d="M9 4v16" stroke="#3a3a3a" stroke-width="1.7"/></svg></div>' +
      '</div>' +
      '<nav class="sb-nav">' +
        '<div class="sb-item cur"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z" stroke="#3a3a3a" stroke-width="1.7" stroke-linejoin="round"/></svg>New chat</div>' +
        '<div class="sb-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#3a3a3a" stroke-width="1.7"/><path d="m20 20-3.5-3.5" stroke="#3a3a3a" stroke-width="1.7" stroke-linecap="round"/></svg>Search chats</div>' +
        '<div class="sb-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="#3a3a3a" stroke-width="1.6"/><circle cx="8.5" cy="9" r="1.6" stroke="#3a3a3a" stroke-width="1.4"/><path d="m4 18 5-5 4 4 3-3 4 4" stroke="#3a3a3a" stroke-width="1.6" stroke-linejoin="round"/></svg>Images</div>' +
        '<div class="sb-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.6" stroke="#3a3a3a" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6" stroke="#3a3a3a" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6" stroke="#3a3a3a" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6" stroke="#3a3a3a" stroke-width="1.6"/></svg>Apps</div>' +
        '<div class="sb-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#3a3a3a" stroke-width="1.6"/><path d="m20 20-3.5-3.5M11 7v4l2.5 1.5" stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round"/></svg>Deep research</div>' +
      '</nav>' +
      '<div class="sb-section">Chats</div>' +
      '<nav class="sb-nav">' +
        '<div class="sb-chat active">Gyors meleg ételek</div>' +
        '<div class="sb-chat">Tanulási ütemterv vizsgára</div>' +
        '<div class="sb-chat">Esszé bevezető átírása</div>' +
        '<div class="sb-chat">Python lista rendezés</div>' +
        '<div class="sb-chat">Heti bevásárlólista</div>' +
        '<div class="sb-chat">Önéletrajz fogalmazás</div>' +
      '</nav>' +
      '<div class="sb-spacer"></div>' +
      '<nav class="sb-nav">' +

      HERO +
      '<section class="conv hidden" id="conv">' +
        '<div class="thread">' +
          '<div class="user-row hidden" id="userRow"><div class="user-bubble" id="userBubble"></div></div>' +

        '<div class="composer-wrap"><div class="composer">' +
          '<div class="composer-text" id="botText">Ask anything</div>' +
          '<div class="composer-row">' +
            '<div class="c-btn c-round"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round"/></svg></div>' +
            '<div class="c-btn c-pill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#3a3a3a" stroke-width="1.7" stroke-linecap="round"/></svg>Tools</div>' +
            '<div class="c-spacer"></div>' +
            '<div class="c-btn c-mic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="11" rx="3" stroke="#3a3a3a" stroke-width="1.7"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#3a3a3a" stroke-width="1.7" stroke-linecap="round"/></svg></div>' +
            '<div class="c-voice"><div class="bars"><i></i><i></i><i></i><i></i><i></i></div></div>' +

      '</section>' +

var SHELL_MOBILE =
  '<div class="phone">' +
    '<div class="topbar">' +
      '<button class="icon-btn" aria-label="Menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h12M4 17h16" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round"/></svg></button>' +
      '<div class="top-right">' +
        '<button class="icon-btn" aria-label="New chat"><svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z" stroke="#0d0d0d" stroke-width="1.8" stroke-linejoin="round"/></svg></button>' +
        '<button class="icon-btn" aria-label="More"><svg width="22" height="22" viewBox="0 0 24 24" fill="#0d0d0d"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>' +
      '</div>' +
    '</div>' +
    HERO +
    '<section class="conv hidden" id="conv">' +
      '<div class="chat">' +
        '<div class="user-row hidden" id="userRow"><div class="user-bubble" id="userBubble"></div></div>' +
        '<div class="thinking hidden" id="thinking"><span></span><span></span><span></span></div>' +
        '<div class="assistant" id="assistant"></div>' +
      '</div>' +
      '<div class="composer"><div class="composer-inner">' +
        '<div class="plus"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round"/></svg></div>' +

        '<div class="mic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="11" rx="3" stroke="#0d0d0d" stroke-width="1.8"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#0d0d0d" stroke-width="1.8" stroke-linecap="round"/></svg></div>' +

var END_SCREEN =
  '<div class="end-screen"><div class="end-card">' +
    '<div class="end-check"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +

/* ---- eszközdetektálás ---- */
var params = new URLSearchParams(location.search);
var forced = params.get('device');
var isMobile = forced === 'mobile' ? true
             : (forced === 'desktop' || forced === 'web') ? false
             : (/Mobi|Android|iPhone|iPod|iPad|Windows Phone/i.test(navigator.userAgent)
                || window.matchMedia('(max-width:820px)').matches);

document.documentElement.classList.add(isMobile ? 'mobile' : 'desktop');
var root = document.getElementById('root');
root.innerHTML = isMobile ? SHELL_MOBILE : SHELL_WEB;
document.getElementById('assistant').innerHTML = RESPONSE;

/* ---- elemek + vezérlés ---- */
function $(s){ return document.querySelector(s); }
var assistant = $('#assistant');
var landing = $('#landing'), conv = $('#conv');
var userRow = $('#userRow'), userBubble = $('#userBubble'), thinking = $('#thinking');
var heroSend = $('#heroSend');
var continueWrap = $('#continueWrap'), continueBtn = $('#continueBtn'), continueHint = $('#continueHint');

$('#heroGreeting').textContent = STUDY.greeting;
var heroTextEl = $('#heroText');
heroTextEl.textContent = STUDY.promptText;
var heroCaret = document.createElement('span'); heroCaret.className = 'hc-caret'; heroTextEl.appendChild(heroCaret);
userBubble.textContent = STUDY.promptText;

var caret = document.createElement('span'); caret.className = 'caret';
var streamEls = [], idx = 0, sent = false, completed = false, autoScroll = true, tSend = 0, tDone = 0;

function scrollBottom(){
  if (!autoScroll) return;
  try { window.scrollTo(0, document.documentElement.scrollHeight); } catch(e){}
}

function revealNext(){
  if (completed) return;
  if (idx >= streamEls.length){ onStreamDone(); return; }
  var el = streamEls[idx++];
  try { el.classList.remove('s-hide'); el.classList.add('s-in'); el.appendChild(caret); } catch(e){}
  scrollBottom();
  var len = (el.textContent || '').length;
  setTimeout(revealNext, Math.min(680, Math.max(170, len * 6)));
}

function onStreamDone(){
  if (completed) return; completed = true;
  try { caret.remove(); } catch(e){}
  tDone = (window.performance && performance.now) ? performance.now() : Date.now();
  // BIZTOSÍTÁS: minden elem (a teljes reklámmal) jelenjen meg.
  var rest = assistant.querySelectorAll('.s-hide');
  for (var i = 0; i < rest.length; i++){ rest[i].classList.remove('s-hide'); rest[i].classList.add('s-in'); }
  scrollBottom();
  autoScroll = false; // a streaming után már nem rángatjuk a görgetést
  // 60 mp olvasási idő után jelenik meg a „Tovább"
  setTimeout(function(){
    continueBtn.disabled = false;
    continueBtn.textContent = 'Tovább';
    continueHint.textContent = 'Ha végeztél, kattints a Tovább gombra.';
    continueWrap.classList.remove('hidden');
    try { window.scrollTo(0, document.documentElement.scrollHeight); } catch(e){}
  }, STUDY.readingSeconds * 1000);
  try { console.log('[stimulus] streaming kész | ' + STUDY.condition + ' | ' + (isMobile ? 'mobil' : 'web') + ' | Tovább ' + STUDY.readingSeconds + ' mp múlva'); } catch(e){}
}

function onSend(){
  if (sent) return; sent = true;
  tSend = (window.performance && performance.now) ? performance.now() : Date.now();
  landing.classList.add('hidden');
  conv.classList.remove('hidden');
  userRow.classList.remove('hidden');
  thinking.classList.remove('hidden');
  autoScroll = true;
  scrollBottom();
  streamEls = [];
  var nodes = assistant.querySelectorAll('.s-hide');
  for (var i = 0; i < nodes.length; i++){ streamEls.push(nodes[i]); }
  setTimeout(function(){ thinking.classList.add('hidden'); revealNext(); }, STUDY.typingDelayMs);
  // GLOBÁLIS BIZTONSÁGI IDŐZÍTŐ: bármi történjék, minden megjelenik és lefut a befejezés.
  setTimeout(onStreamDone, STUDY.failsafeMs);
}
heroSend.addEventListener('click', onSend);

function showEnd(){
  // Új „oldal": a Szimuláció vége képernyő.
  // Valódi átirányításhoz cseréld erre:  window.location.href = 'A_KÖVETKEZŐ_OLDAL_URL';
  document.documentElement.classList.remove('mobile', 'desktop');
  root.innerHTML = END_SCREEN;
  try { window.scrollTo(0, 0); } catch(e){}
}

continueBtn.addEventListener('click', function(){
  if (continueBtn.disabled) return;
  var now = (window.performance && performance.now) ? performance.now() : Date.now();
  var payload = { type: 'stimulus_complete', condition: STUDY.condition, device: (isMobile ? 'mobile' : 'web'),
                  exposure_ms: Math.round(now - tSend), reading_seconds: STUDY.readingSeconds };
  try { window.parent.postMessage(payload, '*'); } catch(e){}
  try { console.log('[stimulus] tovább -> ' + JSON.stringify(payload)); } catch(e){}
  showEnd();
});
</script>
